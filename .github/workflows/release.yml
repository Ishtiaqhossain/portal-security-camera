name: Release APK

# Build a release-signed APK and publish it to a GitHub Release.
#
# Trigger by pushing a version tag:
#   git tag v0.1.1 && git push origin v0.1.1
# or run manually via the Actions tab (workflow_dispatch) with a tag input.
#
# Signing material is injected from repo secrets (see RELEASING.md):
#   RELEASE_KEYSTORE_BASE64  base64 of portal-app/release.keystore
#   RELEASE_STORE_PASSWORD   keystore password
#   RELEASE_KEY_ALIAS        signing key alias (e.g. portal-release)
#   RELEASE_KEY_PASSWORD     key password
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish the release under (e.g. v0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Fail loudly if signing secrets are missing rather than silently falling
      # back to the debug key (build.gradle.kts's local-dev fallback) and
      # shipping a debug-signed APK to users.
      - name: Verify signing secrets are present
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=
          [ -z "$KEYSTORE_B64" ]   && missing="$missing RELEASE_KEYSTORE_BASE64"
          [ -z "$STORE_PASSWORD" ] && missing="$missing RELEASE_STORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]      && missing="$missing RELEASE_KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]   && missing="$missing RELEASE_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:$missing — see RELEASING.md"
            exit 1
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > portal-app/release.keystore

      - name: Build signed release APK
        working-directory: portal-app
        env:
          # build.gradle.kts resolves RELEASE_STORE_FILE via rootProject.file(),
          # i.e. relative to the portal-app gradle root.
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # Confirm the APK is signed with the release key, not the debug key, so a
      # misconfigured secret can never ship a debug-signed build.
      - name: Verify APK is release-signed
        env:
          EXPECTED_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          APK=portal-app/app/build/outputs/apk/release/app-release.apk
          "$BT/apksigner" verify --print-certs "$APK" | tee certs.txt
          if grep -qi 'CN=Android Debug' certs.txt; then
            echo "::error::APK is debug-signed — signing secrets did not take effect"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: portal-app/app/build/outputs/apk/release/app-release.apk

      - name: Clean up keystore
        if: always()
        run: rm -f portal-app/release.keystore
